openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: product
    description: Product content generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /product/generate:
    post:
      operationId: generateProductContent
      tags: [product]
      summary: Generate product content package
      description: Generates a complete high-converting product package from a product image URL and details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateProductContentBody"
      responses:
        "200":
          description: SSE stream of generated product content
          content:
            text/event-stream: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateProductContentBody:
      type: object
      properties:
        imageUrl:
          type: string
          description: URL of the product image
        productCategory:
          type: string
          description: Optional product category
        additionalInfo:
          type: string
          description: Any additional context about the product
      required:
        - imageUrl
    ProductError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
